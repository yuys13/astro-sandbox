name: Nix CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Flake check
        run: nix flake check --all-systems --no-build --keep-going
  nix-build:
    needs: nix-check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile --network-concurrency 1 --child-concurrency 1
      - name: Astro check
        run: nix develop --command pnpm run astro check
      - name: Textlint
        run: nix develop --command pnpm exec textlint src/content/blog/*
      - name: Build
        run: nix develop --command pnpm build
